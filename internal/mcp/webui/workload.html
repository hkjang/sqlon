<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SQLON 워크로드·용량</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--line:#dce4ee;--ink:#172033;--sub:#607086;--blue:#2563eb;--green:#15803d;--amber:#a16207;--red:#b91c1c}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif}header{padding:13px 26px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}h1{font-size:19px;margin:0}.grow{flex:1}select,input,button{border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff}button{cursor:pointer}.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}main{max-width:1600px;margin:auto;padding:20px 26px 60px}.context{padding:11px 14px;background:#17243b;color:#e9f0ff;border-radius:10px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap}.context span{padding-right:9px;border-right:1px solid #42516b}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:14px}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:11px}.card{padding:14px}.card small{display:block;color:var(--sub)}.card b{font-size:24px}.panel{margin-bottom:14px;overflow:hidden}.panel h2{font-size:15px;margin:0;padding:13px 15px;border-bottom:1px solid var(--line)}.split{display:grid;grid-template-columns:1.2fr 1fr;gap:14px}.scroll{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}th{font-size:12px;color:#536176;background:#f8fafc}.muted{color:var(--sub);font-size:12px}.empty{padding:30px;text-align:center;color:var(--sub)}.message{padding:10px 13px;margin-bottom:10px;border:1px solid #efd486;background:#fff8df;color:#74580b;border-radius:9px}.message.error{border-color:#efb0b0;background:#fff0f0;color:#991b1b}.bar{height:7px;background:#e7edf5;border-radius:8px;overflow:hidden;min-width:130px}.bar i{display:block;height:100%;background:var(--green)}.bar.warn i{background:var(--amber)}.bar.bad i{background:var(--red)}svg{width:100%;height:220px;background:#fafcff}.legend{padding:8px 14px;color:var(--sub);font-size:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 4px 0 10px}.qps{background:var(--blue)}.tps{background:var(--green)}@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}.split{grid-template-columns:1fr}main{padding:15px}}
</style></head><body>
<header><h1>워크로드·용량</h1><select id="profile"></select><select id="hours"><option value="1">최근 1시간</option><option value="24" selected>최근 24시간</option><option value="168">최근 7일</option></select><input id="adminToken" type="password" placeholder="관리 토큰 (단독 모드)"><button id="refresh">저장 데이터 조회</button><button class="primary" id="collect">지금 수집</button><span class="grow"></span><span class="muted" id="fresh">수집 전</span></header>
<main><div class="context" id="context"><span>환경 -</span><span>업무서비스 -</span><span>엔진 -</span><span>인스턴스 -</span><span>역할 -</span><span>수집 시각 -</span></div><div id="messages"></div>
<section class="cards"><div class="card"><small>QPS</small><b id="qps">-</b></div><div class="card"><small>TPS</small><b id="tps">-</b></div><div class="card"><small>활성 연결</small><b id="connections">-</b></div><div class="card"><small>대기 유형</small><b id="waits">-</b></div><div class="card"><small>Top SQL</small><b id="sqlCount">-</b></div><div class="card"><small>최고 용량 사용률</small><b id="capacityMax">-</b></div></section>
<section class="panel"><h2>처리량 추이</h2><svg id="trend" viewBox="0 0 900 220" preserveAspectRatio="none" aria-label="QPS TPS 시계열"></svg><div class="legend"><i class="dot qps"></i>QPS <i class="dot tps"></i>TPS · 각 점은 저장된 수집 스냅숏입니다.</div></section>
<div class="split"><section class="panel"><h2>대기 이벤트</h2><div class="scroll"><table><thead><tr><th>분류</th><th>이벤트</th><th>횟수</th><th>누적 대기</th></tr></thead><tbody id="waitRows"></tbody></table></div></section><section class="panel"><h2>누적 카운터</h2><div class="scroll"><table><thead><tr><th>메트릭</th><th>값</th><th>단위</th></tr></thead><tbody id="counterRows"></tbody></table></div></section></div>
<section class="panel"><h2>Top SQL <span class="muted">— SQL 원문 없이 fingerprint/SQL ID만 표시</span></h2><div class="scroll"><table><thead><tr><th>Fingerprint / SQL ID</th><th>Plan Hash</th><th>호출</th><th>총 지연</th><th>CPU</th><th>Reads</th><th>Rows</th></tr></thead><tbody id="sqlRows"></tbody></table></div></section>
<section class="panel" id="capacity"><h2>객체·용량</h2><div class="scroll"><table><thead><tr><th>범위</th><th>대상</th><th>사용량</th><th>할당량 / 최대</th><th>사용률</th><th>일간 증가량</th><th>예상 고갈</th></tr></thead><tbody id="capacityRows"></tbody></table></div></section>
</main><script src="/admin/nav.js"></script><script>
'use strict';const $=s=>document.querySelector(s),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let profiles=[];const token=$('#adminToken');token.value=localStorage.getItem('sqlonAdminToken')||localStorage.getItem('jasqlAdminToken')||'';token.onchange=()=>localStorage.setItem('sqlonAdminToken',token.value);function headers(){const h={Accept:'application/json'};if(token.value)h['X-Admin-Token']=token.value;return h}async function get(path){const r=await fetch(path,{headers:headers()});const b=await r.json().catch(()=>({}));if(!r.ok)throw new Error(b.error||r.statusText);return b}function when(v){if(!v)return '-';const d=new Date(v);return isNaN(d)?v:d.toLocaleString('ko-KR')}function num(v,d=2){return Number(v||0).toLocaleString('ko-KR',{maximumFractionDigits:d})}function bytes(v){v=Number(v||0);const u=['B','KB','MB','GB','TB','PB'];let i=0;while(Math.abs(v)>=1024&&i<u.length-1){v/=1024;i++}return num(v,1)+' '+u[i]}function msgs(list,error){$('#messages').innerHTML=[...new Set(list||[])].map(x=>'<div class="message '+(error?'error':'')+'">'+esc(x)+'</div>').join('')}function ctx(p,t){$('#context').innerHTML=['환경 '+(p.environment||'-'),'업무서비스 '+(p.service_name||'-'),'엔진 '+(p.type||'-'),'인스턴스 '+(p.name||p.id||'-'),'역할 '+(p.role||'-'),'수집 시각 '+when(t)].map(x=>'<span>'+esc(x)+'</span>').join('')}function counter(items,name){return Number((items||[]).find(x=>x.name===name)?.value||0)}
async function loadProfiles(){const b=await get('/api/db-profiles');profiles=b.profiles||[];const last=localStorage.getItem('sqlonWorkloadProfile');$('#profile').innerHTML=profiles.map(p=>'<option value="'+esc(p.id)+'"'+(p.id===last?' selected':'')+'>'+esc(p.service_name||p.name||p.id)+' · '+esc(p.type)+'</option>').join('')||'<option value="">프로파일 없음</option>';$('#profile').onchange=()=>{localStorage.setItem('sqlonWorkloadProfile',$('#profile').value);load(false)}}
function line(values,color,max){if(values.length<2)return '';const pts=values.map((v,i)=>(20+i*860/(values.length-1))+','+(195-(Number(v||0)/max)*165)).join(' ');return '<polyline fill="none" stroke="'+color+'" stroke-width="3" points="'+pts+'"/>'}function chart(history){const chronological=[...(history||[])].reverse(),q=chronological.map(x=>x.rates?.qps||0),t=chronological.map(x=>x.rates?.tps||0),max=Math.max(1,...q,...t);$('#trend').innerHTML='<line x1="20" y1="195" x2="880" y2="195" stroke="#cad5e3"/>'+line(q,'#2563eb',max)+line(t,'#15803d',max)+(chronological.length<2?'<text x="450" y="110" text-anchor="middle" fill="#607086">변화율 차트에는 2개 이상의 저장 스냅숏이 필요합니다.</text>':'')}
function render(work,top,capacity,history){const d=work.data||{},rates=d.rates||{},c=d.counters||[],wait=d.waits||[],sql=top.data?.top_sql||[],caps=capacity.data?.capacity||[],growth=capacity.data?.growth_bytes_per_day||{},exhaust=capacity.data?.days_to_exhaustion||{};$('#qps').textContent=num(rates.qps);$('#tps').textContent=num(rates.tps);$('#connections').textContent=num(counter(c,'active_connections'),0);$('#waits').textContent=wait.length;$('#sqlCount').textContent=sql.length;$('#capacityMax').textContent=num(Math.max(0,...caps.map(x=>x.usage_percent||0)),1)+'%';$('#counterRows').innerHTML=c.length?c.map(x=>'<tr><td>'+esc(x.name)+'</td><td>'+num(x.value)+'</td><td>'+esc(x.unit)+'</td></tr>').join(''):'<tr><td colspan="3" class="empty">수집된 카운터가 없습니다.</td></tr>';$('#waitRows').innerHTML=wait.length?wait.map(x=>'<tr><td>'+esc(x.class)+'</td><td>'+esc(x.event||'-')+'</td><td>'+num(x.count,0)+'</td><td>'+num(x.time_ms,1)+' ms</td></tr>').join(''):'<tr><td colspan="4" class="empty">수집된 대기 이벤트가 없습니다.</td></tr>';$('#sqlRows').innerHTML=sql.length?sql.map(x=>'<tr><td>'+esc(x.fingerprint)+'</td><td>'+esc(x.plan_hash||'-')+'</td><td>'+num(x.calls,0)+'</td><td>'+num(x.elapsed_ms,1)+' ms</td><td>'+num(x.cpu_ms,1)+' ms</td><td>'+num(x.reads,0)+'</td><td>'+num(x.rows,0)+'</td></tr>').join(''):'<tr><td colspan="7" class="empty">Top SQL 통계가 없습니다. 권한·확장 기능 limitation을 확인하세요.</td></tr>';$('#capacityRows').innerHTML=caps.length?caps.map(x=>{const key=x.scope+':'+x.name,pct=Number(x.usage_percent||0),cls=pct>=90?'bad':pct>=80?'warn':'',days=exhaust[key];return '<tr><td>'+esc(x.scope)+'</td><td>'+esc(x.name)+'</td><td>'+bytes(x.used_bytes)+'</td><td>'+bytes(x.allocated_bytes||x.max_bytes)+'</td><td><div>'+num(pct,1)+'%</div><div class="bar '+cls+'"><i style="width:'+Math.min(100,pct)+'%"></i></div></td><td>'+bytes(growth[key]||0)+'/일</td><td>'+(days?num(days,1)+'일':'산정 불가')+'</td></tr>'}).join(''):'<tr><td colspan="7" class="empty">용량 데이터가 없습니다.</td></tr>';chart(history.data||[])}
async function load(fresh){const id=$('#profile').value;if(!id)return;$('#fresh').textContent=fresh?'새 스냅숏 수집 중…':'저장 스냅숏 조회 중…';try{const suffix='?profile='+encodeURIComponent(id)+(fresh?'&fresh=true':'');const work=await get('/api/observability/workload'+suffix);const [top,capacity,history]=await Promise.all([get('/api/observability/top-sql?profile='+encodeURIComponent(id)),get('/api/observability/capacity?profile='+encodeURIComponent(id)),get('/api/observability/history?profile='+encodeURIComponent(id)+'&hours='+$('#hours').value+'&limit=1000')]);render(work,top,capacity,history);const p=profiles.find(x=>x.id===id)||{};ctx(p,work.collected_at);$('#fresh').textContent='최신 '+when(work.collected_at)+' · '+esc(work.trace_id||'');msgs([...(work.warnings||[]),...(work.limitations||[]),...(top.warnings||[]),...(top.limitations||[]),...(capacity.warnings||[]),...(capacity.limitations||[])],false)}catch(e){msgs(['조회 실패: '+e.message+' — 데이터 없음과 수집 실패는 서로 다른 상태입니다.'],true);$('#fresh').textContent='수집 실패'}}$('#refresh').onclick=()=>load(false);$('#collect').onclick=()=>load(true);$('#hours').onchange=()=>load(false);JASQL.mount({page:'workload',onReady:async()=>{try{await loadProfiles();await load(false)}catch(e){msgs(['프로파일 조회 실패: '+e.message],true)}}});
</script></body></html>
