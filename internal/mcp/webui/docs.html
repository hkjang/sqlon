<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sqlon API 문서 (Swagger)</title>
  <link rel="stylesheet" href="/docs/swagger-ui.css">
  <style>
    body { margin: 0; }
    .topbar-note {
      background: #1b2a4a; color: #dfe8ff; padding: 10px 16px;
      font: 14px/1.5 -apple-system, "Malgun Gothic", sans-serif;
    }
    .topbar-note a { color: #8fc1ff; }
  </style>
</head>
<body>
  <div class="topbar-note">
    JASQL 데이터셋 관리 REST API 문서입니다. 화면에서 직접 관리하려면 <a href="/admin">/admin 관리 콘솔</a>을 사용하세요.
    변경 API는 서버가 <code>-admin-token</code>으로 기동된 경우 우측 상단 <b>Authorize</b>에 토큰을 입력해야 합니다.
  </div>
  <div id="swagger-ui"></div>
  <script src="/docs/swagger-ui-bundle.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "/openapi.json",
      dom_id: "#swagger-ui",
      docExpansion: "list",
      defaultModelsExpandDepth: 1,
      tryItOutEnabled: true,
      persistAuthorization: true
    });
  </script>
</body>
</html>
