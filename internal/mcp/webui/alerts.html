<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SQLON SRE & DBA 경고 알림</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--line:#dce4ee;--ink:#172033;--sub:#607086;--blue:#2563eb;--ok:#15803d;--warn:#a16207;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif}
header{padding:13px 26px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}h1{font-size:19px;margin:0}header .grow{flex:1}input,button{border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff}button{cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
main{max-width:1600px;margin:auto;padding:20px 26px 60px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:14px;overflow:hidden}.panel h2{font-size:15px;margin:0;padding:13px 15px;border-bottom:1px solid var(--line)}.scroll{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}th{font-size:12px;color:#536176;background:#f8fafc}.muted{color:var(--sub);font-size:12px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;background:#eef2f7;font-size:11px;font-weight:bold;}
.badge.critical{background:#fee2e2;color:#991b1b}
.badge.warning{background:#fef3c7;color:#854d0e}
.badge.info{background:#e0f2fe;color:#0369a1}
.empty{padding:48px;text-align:center;color:var(--sub);font-size:15px}
.message{padding:11px 13px;margin-bottom:12px;border-radius:9px;background:#fff8df;border:1px solid #efd486;color:#74580b}
.message.error{background:#fff0f0;border-color:#efb0b0;color:#991b1b}
</style>
</head>
<body>
<header><h1>🚨 장애 · 경고 알림 (SRE Alerts)</h1><input id="adminToken" type="password" placeholder="관리 토큰 (단독 모드)"><button class="primary" id="refresh">새로고침</button><span class="grow"></span><span class="muted" id="fresh">조회 전</span></header>
<main>
  <div id="messages"></div>
  <section class="panel">
    <h2>실시간 수집 장애 및 쿼리 latency 회귀 알림 목록</h2>
    <div class="scroll">
      <table>
        <thead>
          <tr>
            <th>알림 ID</th>
            <th>프로파일</th>
            <th>위험도</th>
            <th>유형</th>
            <th>내용</th>
            <th>발생 시각</th>
          </tr>
        </thead>
        <tbody id="alertRows">
          <tr><td colspan="6" class="empty">조회 전</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<script src="/admin/nav.js"></script>
<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const token=$('#adminToken');
token.value=localStorage.getItem('sqlonAdminToken')||localStorage.getItem('jasqlAdminToken')||'';
token.onchange=()=>localStorage.setItem('sqlonAdminToken',token.value);

function headers(){
  const h={Accept:'application/json'};
  if(token.value)h['X-Admin-Token']=token.value;
  return h;
}

function when(v){
  if(!v)return '-';
  const d=new Date(v);
  return isNaN(d)?esc(v):d.toLocaleString('ko-KR');
}

async function get(path){
  const r=await fetch(path,{headers:headers()});
  const b=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(b.error||r.statusText);
  return b;
}

async function load(){
  $('#fresh').textContent='알림 조회 중…';
  try{
    const r=await get('/api/db/alerts');
    const list=r.alerts||[];
    
    $('#alertRows').innerHTML=list.length?list.map(a=>{
      const badgeCls=esc(a.severity);
      return '<tr>' +
        '<td class="mono"><b>'+esc(a.id)+'</b></td>' +
        '<td class="mono">'+esc(a.profile_id)+'</td>' +
        '<td><span class="badge '+badgeCls+'">'+badgeCls.toUpperCase()+'</span></td>' +
        '<td><span class="badge">'+esc(a.metric_name)+'</span></td>' +
        '<td style="white-space:normal; max-width:600px; word-break:break-all;">'+esc(a.message)+'</td>' +
        '<td>'+when(a.timestamp)+'</td>' +
        '</tr>';
    }).join(''):'<tr><td colspan="6" class="empty">🎉 감지된 활성 경고나 지표 회귀 현상이 없습니다. 시스템이 안정적입니다.</td></tr>';
    
    $('#fresh').textContent='최신 조회 '+new Date().toLocaleTimeString('ko-KR');
    $('#messages').innerHTML='';
  }catch(e){
    $('#messages').innerHTML='<div class="message error">알림 조회 실패: '+esc(e.message)+'</div>';
    $('#fresh').textContent='조회 실패';
  }
}

$('#refresh').onclick=load;
JASQL.mount({page:'alerts',onReady:async()=>{
  await load();
  // Poll alerts every 15 seconds
  setInterval(load, 15000);
}});
</script>
</body></html>
