<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SQLON 세션·잠금</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--line:#dce4ee;--ink:#172033;--sub:#607086;--blue:#2563eb;--ok:#15803d;--warn:#a16207;--bad:#b91c1c}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Noto Sans KR","Malgun Gothic",sans-serif}
header{padding:13px 26px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}h1{font-size:19px;margin:0}header .grow{flex:1}select,input,button{border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff}button{cursor:pointer}button.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
main{max-width:1600px;margin:auto;padding:20px 26px 60px}.context{padding:11px 14px;background:#17243b;color:#e9f0ff;border-radius:10px;margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap}.context span{padding-right:9px;border-right:1px solid #42516b}.context span:last-child{border:0}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:14px}.card,.panel{background:var(--card);border:1px solid var(--line);border-radius:11px}.card{padding:14px}.card small{display:block;color:var(--sub)}.card b{font-size:24px}.bad b{color:var(--bad)}.warn b{color:var(--warn)}
.panel{margin-bottom:14px;overflow:hidden}.panel h2{font-size:15px;margin:0;padding:13px 15px;border-bottom:1px solid var(--line)}.scroll{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;border-bottom:1px solid #edf1f5;text-align:left;white-space:nowrap}th{font-size:12px;color:#536176;background:#f8fafc}.muted{color:var(--sub);font-size:12px}.badge{display:inline-block;padding:2px 7px;border-radius:10px;background:#eef2f7;font-size:11px}.badge.protected{background:#fee2e2;color:#991b1b}.badge.wait{background:#fef3c7;color:#854d0e}.empty{padding:32px;text-align:center;color:var(--sub)}
.roots{display:flex;gap:10px;flex-wrap:wrap;padding:13px}.root{border:1px solid #f2b8b8;background:#fff5f5;border-radius:9px;padding:10px 13px}.root b{color:#991b1b}.edge{display:grid;grid-template-columns:minmax(160px,1fr) 70px minmax(160px,1fr) 1fr;gap:9px;align-items:center}.arrow{text-align:center;color:var(--bad);font-weight:800}.message{padding:11px 13px;margin-bottom:12px;border-radius:9px;background:#fff8df;border:1px solid #efd486;color:#74580b}.message.error{background:#fff0f0;border-color:#efb0b0;color:#991b1b}
@media(max-width:950px){.cards{grid-template-columns:repeat(2,1fr)}main{padding:15px}.edge{grid-template-columns:1fr}.arrow{text-align:left}.arrow:after{content:' 아래 세션 차단'}}
</style>
</head>
<body>
<header><h1>세션·잠금</h1><select id="profile" aria-label="DB 프로파일"></select><input id="adminToken" type="password" placeholder="관리 토큰 (단독 모드)"><button class="primary" id="refresh">새로고침</button><span class="grow"></span><span class="muted" id="fresh">수집 전</span></header>
<main>
  <div class="context" id="context"><span>환경 -</span><span>업무서비스 -</span><span>엔진 -</span><span>인스턴스 -</span><span>역할 -</span><span>수집 시각 -</span></div>
  <div id="messages"></div>
  <section class="cards"><div class="card"><small>전체 세션</small><b id="total">-</b></div><div class="card"><small>활성</small><b id="active">-</b></div><div class="card warn"><small>대기</small><b id="waiting">-</b></div><div class="card warn"><small>장기 실행</small><b id="long">-</b></div><div class="card bad"><small>차단 세션</small><b id="blocked">-</b></div><div class="card bad"><small>루트 블로커</small><b id="rootCount">-</b></div></section>
  <section class="panel"><h2>블로킹 트리</h2><div class="roots" id="roots"><span class="muted">수집 전</span></div><div class="scroll"><table><thead><tr><th>블로커</th><th>관계</th><th>차단된 세션</th><th>잠금·대기</th></tr></thead><tbody id="lockRows"><tr><td colspan="4" class="empty">수집 전</td></tr></tbody></table></div></section>
  <section class="panel"><h2>세션 목록 <span class="muted">— SQL 본문과 bind 값은 표시하지 않습니다</span></h2><div class="scroll"><table><thead><tr><th>세션 키</th><th>사용자·서비스</th><th>상태</th><th>SQL ID</th><th>SQL 실행시간</th><th>트랜잭션 시간</th><th>대기</th><th>클라이언트·모듈</th><th>보호</th></tr></thead><tbody id="sessionRows"><tr><td colspan="9" class="empty">수집 전</td></tr></tbody></table></div></section>
</main>
<script src="/admin/nav.js"></script>
<script>
'use strict';
const $=s=>document.querySelector(s);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let profiles=[];
const token=$('#adminToken');token.value=localStorage.getItem('sqlonAdminToken')||localStorage.getItem('jasqlAdminToken')||'';token.onchange=()=>localStorage.setItem('sqlonAdminToken',token.value);
function headers(){const h={Accept:'application/json'};if(token.value)h['X-Admin-Token']=token.value;return h}function when(v){if(!v)return '-';const d=new Date(v);return isNaN(d)?esc(v):d.toLocaleString('ko-KR')}function duration(v){v=Number(v||0);if(v<60)return v+'초';if(v<3600)return Math.floor(v/60)+'분 '+v%60+'초';return Math.floor(v/3600)+'시간 '+Math.floor(v%3600/60)+'분'}
async function get(path){const r=await fetch(path,{headers:headers()});const b=await r.json().catch(()=>({}));if(!r.ok)throw new Error(b.error||r.statusText);return b}
async function loadProfiles(){const b=await get('/api/db-profiles');profiles=b.profiles||[];const last=localStorage.getItem('sqlonObserveProfile');$('#profile').innerHTML=profiles.map(p=>'<option value="'+esc(p.id)+'"'+(p.id===last?' selected':'')+'>'+esc(p.service_name||p.name||p.id)+' · '+esc(p.type)+'</option>').join('')||'<option value="">프로파일 없음</option>';$('#profile').onchange=()=>{localStorage.setItem('sqlonObserveProfile',$('#profile').value);load()}}
function showMessages(items,error){$('#messages').innerHTML=(items||[]).map(x=>'<div class="message '+(error?'error':'')+'">'+esc(x)+'</div>').join('')}
function context(profile,collected){$('#context').innerHTML=['환경 '+(profile.environment||'-'),'업무서비스 '+(profile.service_name||'-'),'엔진 '+(profile.type||'-'),'인스턴스 '+(profile.name||profile.id||'-'),'역할 '+(profile.role||'-'),'수집 시각 '+when(collected)].map(x=>'<span>'+esc(x)+'</span>').join('')}
function renderSessions(body){const d=body.data||{};$('#total').textContent=d.total??0;$('#active').textContent=d.active??0;$('#waiting').textContent=d.waiting??0;$('#long').textContent=d.long_running??0;const rows=d.sessions||[];$('#sessionRows').innerHTML=rows.length?rows.map(s=>'<tr><td><b>'+esc(s.session_key)+'</b><div class="muted">'+esc(s.instance_id||'')+'</div></td><td>'+esc(s.user||'-')+'<div class="muted">'+esc(s.service||'-')+'</div></td><td><span class="badge">'+esc(s.state||'-')+'</span></td><td>'+esc(s.sql_id||'-')+'</td><td>'+duration(s.duration_seconds)+'</td><td>'+duration(s.transaction_seconds)+'</td><td>'+(s.wait_event?'<span class="badge wait">'+esc(s.wait_class)+' · '+esc(s.wait_event)+'</span>':'-')+'</td><td>'+esc(s.client||'-')+'<div class="muted">'+esc(s.application||'-')+'</div></td><td>'+(s.protected?'<span class="badge protected">보호 · '+esc(s.protection_reason)+'</span>':'일반')+'</td></tr>').join(''):'<tr><td colspan="9" class="empty">정상 수집되었으며 표시할 세션이 없습니다.</td></tr>';return [...(body.warnings||[]),...(body.limitations||[])]}
function renderLocks(body){const d=body.data||{},roots=d.roots||[],edges=d.edges||[];$('#blocked').textContent=d.blocked_sessions??0;$('#rootCount').textContent=roots.length;$('#roots').innerHTML=roots.length?roots.map(r=>'<div class="root"><b>'+esc(r.session_key)+'</b><div>'+esc(r.user||'사용자 미확인')+' · 영향 '+esc(r.affected_sessions)+'개 세션</div></div>').join(''):'<span class="muted">정상 수집되었으며 현재 루트 블로커가 없습니다.</span>';$('#lockRows').innerHTML=edges.length?edges.map(e=>'<tr><td>'+esc(e.blocker_key)+'<div class="muted">'+esc(e.blocker_user||'-')+'</div></td><td class="arrow">→ 차단</td><td>'+esc(e.blocked_key)+'<div class="muted">'+esc(e.blocked_user||'-')+'</div></td><td>'+esc(e.lock_type||'-')+' · '+duration(e.wait_seconds)+'</td></tr>').join(''):'<tr><td colspan="4" class="empty">정상 수집되었으며 현재 블로킹 관계가 없습니다.</td></tr>';return [...(body.warnings||[]),...(body.limitations||[])]}
async function load(){const id=$('#profile').value;if(!id)return;$('#fresh').textContent='수집 중…';try{const [sessions,locks]=await Promise.all([get('/api/observability/sessions?profile='+encodeURIComponent(id)),get('/api/observability/locks?profile='+encodeURIComponent(id))]);const profile=profiles.find(p=>p.id===id)||{};context(profile,sessions.collected_at);$('#fresh').textContent='최신 수집 '+when(sessions.collected_at)+' · '+esc(sessions.trace_id||'');showMessages([...renderSessions(sessions),...renderLocks(locks)],false)}catch(e){showMessages(['수집 실패: '+e.message+' — 데이터 없음과 수집 실패는 서로 다른 상태입니다.'],true);$('#fresh').textContent='수집 실패'}}
$('#refresh').onclick=load;JASQL.mount({page:'sessions',onReady:async()=>{try{await loadProfiles();await load()}catch(e){showMessages(['프로파일 조회 실패: '+e.message],true)}}});
</script>
</body></html>
