# SQLON Demo Scenario
start_url: "http://localhost:9797"
steps:
  - id: open-fleet
    action: goto
    url: "/"
    caption: "SQLON AI Database Operations Platform에 접속합니다"
    
  - id: wait-fleet
    action: pause
    milliseconds: 2000
    
  - id: open-dba
    action: goto
    url: "/admin/dba"
    caption: "DBA 코파일럿 자가 진단 및 권고 화면으로 이동합니다"
    
  - id: wait-dba
    action: pause
    milliseconds: 2000
    
  - id: open-security
    action: goto
    url: "/admin/security"
    caption: "보안 취약점 및 접속 권한 진단 상태를 확인합니다"
    
  - id: wait-security
    action: pause
    milliseconds: 2000
    
  - id: open-docs
    action: goto
    url: "/docs"
    caption: "SQLON REST API 명세 및 Swagger 문서를 로드합니다"
    
  - id: wait-docs
    action: pause
    milliseconds: 3000
    
  - id: final-capture
    action: screenshot
    name: "finished-run"
    caption: "성공적으로 진단을 마치고 캡처합니다"
